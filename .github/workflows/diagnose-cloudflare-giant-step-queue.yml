name: Diagnose Cloudflare giant-step queue

on:
  push:
    branches:
      - ops/cloudflare-access-bootstrap
    paths:
      - .ops-trigger/cloudflare-queue-diagnostic
      - .github/workflows/diagnose-cloudflare-giant-step-queue.yml

permissions:
  actions: read
  contents: read
  statuses: write

jobs:
  diagnose:
    name: Inspect queued giant-step run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect run and pending deployment metadata
        id: inspect
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = 29701158803;
            const run = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: runId });
            const jobs = await github.rest.actions.listJobsForWorkflowRun({ owner, repo, run_id: runId, filter: 'all', per_page: 100 });
            let pendingDeployments = [];
            let pendingDeploymentError = null;
            try {
              const response = await github.request('GET /repos/{owner}/{repo}/actions/runs/{run_id}/pending_deployments', {
                owner, repo, run_id: runId,
              });
              pendingDeployments = response.data;
            } catch (error) {
              pendingDeploymentError = error?.status ? `HTTP ${error.status}` : String(error);
            }
            let runners = null;
            let runnerError = null;
            try {
              const response = await github.request('GET /repos/{owner}/{repo}/actions/runners', { owner, repo, per_page: 100 });
              runners = response.data.runners.map((runner) => ({
                name: runner.name,
                status: runner.status,
                busy: runner.busy,
                labels: runner.labels.map((label) => label.name),
              }));
            } catch (error) {
              runnerError = error?.status ? `HTTP ${error.status}` : String(error);
            }
            const output = {
              generatedAt: new Date().toISOString(),
              run: {
                id: run.data.id,
                status: run.data.status,
                conclusion: run.data.conclusion,
                attempt: run.data.run_attempt,
                event: run.data.event,
                headSha: run.data.head_sha,
                updatedAt: run.data.updated_at,
              },
              jobs: jobs.data.jobs.map((job) => ({
                id: job.id,
                name: job.name,
                status: job.status,
                conclusion: job.conclusion,
                runnerName: job.runner_name || null,
                startedAt: job.started_at,
                completedAt: job.completed_at,
              })),
              pendingDeployments: pendingDeployments.map((deployment) => ({
                environment: deployment.environment?.name || null,
                waitTimer: deployment.wait_timer,
                currentUserCanApprove: deployment.current_user_can_approve,
                reviewers: (deployment.reviewers || []).map((reviewer) => reviewer.reviewer?.login || reviewer.reviewer?.name || reviewer.type),
              })),
              pendingDeploymentError,
              runners,
              runnerError,
            };
            fs.writeFileSync('cloudflare-queue-diagnostic.json', `${JSON.stringify(output, null, 2)}\n`);
            core.info(`run-status=${output.run.status}`);
            core.info(`run-attempt=${output.run.attempt}`);
            core.info(`job-count=${output.jobs.length}`);
            core.info(`pending-deployment-count=${output.pendingDeployments.length}`);
            if (runners) {
              for (const runner of runners) core.info(`runner=${runner.name} status=${runner.status} busy=${runner.busy}`);
            } else {
              core.info(`runner-metadata-unavailable=${runnerError}`);
            }
            core.setOutput('run_status', output.run.status);
            core.setOutput('pending_count', String(output.pendingDeployments.length));

      - name: Upload safe queue evidence
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-queue-diagnostic-${{ github.run_id }}
          path: cloudflare-queue-diagnostic.json
          retention-days: 7

      - name: Publish diagnostic status
        if: always()
        uses: actions/github-script@v7
        env:
          RESULT: ${{ job.status }}
          RUN_STATUS: ${{ steps.inspect.outputs.run_status }}
          PENDING_COUNT: ${{ steps.inspect.outputs.pending_count }}
        with:
          script: |
            const success = process.env.RESULT === 'success';
            const description = success
              ? `Giant step run=${process.env.RUN_STATUS || 'unknown'} pending-env=${process.env.PENDING_COUNT || '0'}`
              : 'Actions queue diagnostic failed';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'chat-v2/cloudflare-queue-diagnostic',
              description: description.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
