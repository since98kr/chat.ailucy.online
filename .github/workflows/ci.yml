name: V2 CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

concurrency:
  group: chat-v2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-web-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
