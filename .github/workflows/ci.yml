name: V2 CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

concurrency:
  group: chat-v2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    name: Typecheck, test, build, and container smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-typecheck-log
          path: typecheck.log
          if-no-files-found: warn
          retention-days: 7

      - name: API integration tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-web-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload API build
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-api-dist
          path: dist-server
          if-no-files-found: error
          retention-days: 7

      - name: Build production container
        run: docker build --tag chat-ailucy-v2:ci .

      - name: Container smoke test
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach --name chat-v2-ci --publish 127.0.0.1:4180:4174 chat-ailucy-v2:ci
          cleanup() {
            docker logs chat-v2-ci || true
            docker rm --force chat-v2-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4180/api/health > health.json; then
              break
            fi
            sleep 1
          done

          node -e "const h=require('./health.json'); if(!h.ok || !h.adapters.letta.ok || !h.adapters.hermes.ok) process.exit(1)"
          curl --fail --silent http://127.0.0.1:4180/ | grep --quiet 'chat.ailucy.online V2'
          test "$(docker inspect --format='{{.State.Health.Status}}' chat-v2-ci)" != "unhealthy"
