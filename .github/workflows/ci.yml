name: V2 CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

concurrency:
  group: chat-v2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-typecheck-log
          path: typecheck.log
          if-no-files-found: warn
          retention-days: 7

      - name: API integration tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-web-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload API build
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-api-dist
          path: dist-server
          if-no-files-found: error
          retention-days: 7
