name: V2 CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

concurrency:
  group: chat-v2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    name: Typecheck, test, browser regression, build, and container smoke
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate deployment, preflight, runner, and recovery scripts
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/deploy/staging.sh
          bash -n scripts/deploy/production.sh
          bash -n scripts/ops/staging-preflight.sh
          bash -n scripts/ops/production-preflight.sh
          bash -n scripts/ops/staging-smoke.sh
          bash -n scripts/ops/staging-browser-smoke.sh
          bash -n scripts/ops/external-staging-browser-smoke.sh
          bash -n scripts/ops/configure-cloudflare-access-qa.sh
          bash -n scripts/ops/staging-redeploy-smoke.sh
          bash -n scripts/runner/install-chat-staging-runner.sh
          bash -n scripts/runner/install-chat-production-runner.sh
          bash -n scripts/backup/restore-staging.sh
          bash -n scripts/ci/container-smoke.sh
          CHAT_IMAGE=chat-ailucy-v2:validation docker compose -f compose.staging.yml config >/dev/null
          CHAT_IMAGE=chat-ailucy-v2:validation \
            CHAT_PRODUCTION_PORT=4180 \
            CHAT_PRODUCTION_DATA_DIR=/tmp/chat-v2-production/data \
            CHAT_PUBLIC_ORIGIN=https://chat.example.invalid \
            CHAT_ALLOWED_ORIGIN=https://chat.example.invalid \
            CHAT_AUTH_MODE=token \
            LETTA_BASE_URL=http://letta.example.invalid \
            LETTA_AGENT_ID=letta-validation \
            HERMES_BASE_URL=http://hermes.example.invalid \
            HERMES_AGENT_ID=hermes-validation \
            docker compose -f compose.production.yml config >/dev/null

      - name: Validate production runner bootstrap guards without host mutation
        shell: bash
        run: |
          set -euo pipefail
          digest="$(printf 'a%.0s' {1..64})"
          script='scripts/runner/install-chat-production-runner.sh'

          common=(
            RUNNER_VALIDATE_ONLY=true
            GITHUB_REPOSITORY_URL=https://github.com/since98kr/chat.ailucy.online
            RUNNER_VERSION=2.335.1
            RUNNER_SHA256="${digest}"
            RUNNER_NAME=agentlucy-chat-production
          )

          env "${common[@]}" bash "${script}" >/tmp/production-runner-valid.log
          grep -Fq 'No user, directory, runner, service, Docker, or GitHub state was changed.' \
            /tmp/production-runner-valid.log

          expect_failure() {
            local label="$1"
            shift
            if "$@" >/dev/null 2>&1; then
              echo "production runner guard unexpectedly accepted: ${label}" >&2
              exit 1
            fi
          }

          expect_failure staging-name \
            env "${common[@]}" RUNNER_NAME=agentlucy-chat-staging bash "${script}"
          expect_failure staging-user \
            env "${common[@]}" RUNNER_USER=chat-runner bash "${script}"
          expect_failure staging-runner-home \
            env "${common[@]}" RUNNER_HOME=/opt/actions-runner-chat-staging bash "${script}"
          expect_failure staging-production-root \
            env "${common[@]}" CHAT_PRODUCTION_ROOT=/opt/chat-v2/staging bash "${script}"
          expect_failure foreign-repository \
            env "${common[@]}" GITHUB_REPOSITORY_URL=https://github.com/example/other bash "${script}"
          expect_failure malformed-checksum \
            env "${common[@]}" RUNNER_SHA256=not-a-checksum bash "${script}"

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-typecheck-log
          path: typecheck.log
          if-no-files-found: warn
          retention-days: 7

      - name: API, adapter, security, preflight, and backup tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Upload integration test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-test-log
          path: test.log
          if-no-files-found: warn
          retention-days: 7

      - name: Production build
        run: npm run build

      - name: Install Chromium for browser regression
        run: npx playwright install --with-deps chromium

      - name: Desktop and mobile browser regression
        run: npm run test:e2e

      - name: Token-authenticated desktop and mobile regression
        run: npm run test:e2e:auth

      - name: Upload browser screenshots and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-browser-regression
          path: |
            test-results-browser
            test-results-auth
            playwright-report
            playwright-auth-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-web-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload API build
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-api-dist
          path: dist-server
          if-no-files-found: error
          retention-days: 7

      - name: Build versioned production container
        run: |
          docker build \
            --build-arg CHAT_BUILD_SHA=ci-sha \
            --build-arg CHAT_BUILD_TIME=2026-07-18T00:00:00Z \
            --build-arg CHAT_VERSION=0.8.0 \
            --tag chat-ailucy-v2:ci .

      - name: Exercise host staging-preflight wrapper
        shell: bash
        env:
          CHAT_STAGING_ROOT: ${{ runner.temp }}/chat-v2-staging
          CHAT_STAGING_DATA_DIR: ${{ runner.temp }}/chat-v2-staging/data
          CHAT_STAGING_PORT: '4199'
          CHAT_PREFLIGHT_STRICT: 'false'
          CHAT_PREFLIGHT_MIN_FREE_BYTES: '1'
        run: |
          set -o pipefail
          bash scripts/ops/staging-preflight.sh chat-ailucy-v2:ci ci-sha 2>&1 | tee staging-preflight.log

      - name: Validate production safety guards without host mutation
        shell: bash
        run: |
          set -euo pipefail
          if CHAT_PRODUCTION_PORT=4180 bash scripts/ops/production-preflight.sh chat-ailucy-v2:ci not-a-full-sha 2>/dev/null; then
            echo 'production preflight accepted a mutable or invalid revision' >&2
            exit 1
          fi
          if CHAT_PRODUCTION_PORT=4180 CHAT_PRODUCTION_MODE=deploy \
            bash scripts/deploy/production.sh not-a-full-sha 2>/dev/null; then
            echo 'production deployment controller accepted an invalid revision' >&2
            exit 1
          fi

      - name: Container security, identity, and recovery smoke test
        shell: bash
        env:
          CHAT_EXPECTED_SHA: ci-sha
        run: |
          set -o pipefail
          bash scripts/ci/container-smoke.sh 2>&1 | tee container-smoke.log

      - name: Upload container smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-container-smoke
          path: |
            container-smoke.log
            staging-preflight.log
            ${{ runner.temp }}/chat-v2-staging/state/last-preflight.json
            preflight.json
            health.json
            ops-status.json
            response-headers.txt
            backup.json
            backup-verify.json
            unauthorized.json
            authorized.json
            ops-unauthorized.json
            ops-authorized.json
          if-no-files-found: warn
          retention-days: 7
