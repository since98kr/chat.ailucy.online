name: V2 CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

concurrency:
  group: chat-v2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    name: Typecheck, test, browser regression, build, and container smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate deployment and recovery scripts
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/deploy/staging.sh
          bash -n scripts/runner/install-chat-staging-runner.sh
          bash -n scripts/backup/restore-staging.sh
          CHAT_IMAGE=chat-ailucy-v2:validation docker compose -f compose.staging.yml config >/dev/null

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-typecheck-log
          path: typecheck.log
          if-no-files-found: warn
          retention-days: 7

      - name: API, adapter, security, and backup tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Upload integration test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-test-log
          path: test.log
          if-no-files-found: warn
          retention-days: 7

      - name: Production build
        run: npm run build

      - name: Install Chromium for browser regression
        run: npx playwright install --with-deps chromium

      - name: Desktop and mobile browser regression
        run: npm run test:e2e

      - name: Upload browser screenshots and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-browser-regression
          path: |
            test-results
            playwright-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-web-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload API build
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-api-dist
          path: dist-server
          if-no-files-found: error
          retention-days: 7

      - name: Build production container
        run: docker build --tag chat-ailucy-v2:ci .

      - name: Container security and recovery smoke test
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach --name chat-v2-ci --publish 127.0.0.1:4180:4174 chat-ailucy-v2:ci
          cleanup() {
            docker logs chat-v2-ci || true
            docker logs chat-v2-auth || true
            docker rm --force chat-v2-ci chat-v2-auth >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4180/api/health > health.json; then
              break
            fi
            sleep 1
          done

          node -e "const h=require('./health.json'); if(!h.ok || h.adapters.letta.mode!=='mock' || h.adapters.hermes.mode!=='mock') process.exit(1)"
          curl --fail --silent --dump-header response-headers.txt http://127.0.0.1:4180/ --output index.html
          grep --quiet 'chat.ailucy.online V2' index.html
          grep --ignore-case --quiet '^content-security-policy:' response-headers.txt
          curl --fail --silent http://127.0.0.1:4180/manifest.webmanifest | grep --quiet 'Lucy Chat'
          curl --fail --silent http://127.0.0.1:4180/sw.js | grep --quiet 'CACHE_NAME'
          curl --fail --silent 'http://127.0.0.1:4180/api/search?q=Chat&systemId=hermes' | grep --quiet 'Chat V2 개발'

          docker exec chat-v2-ci node dist-server/backup.js create > backup.json
          BACKUP_ID="$(node -e "const j=require('./backup.json');if(!j.id)process.exit(1);process.stdout.write(j.id)")"
          docker exec chat-v2-ci node dist-server/backup.js verify "/data/backups/${BACKUP_ID}" > backup-verify.json
          node -e "const j=require('./backup-verify.json');if(!j.ok)process.exit(1)"
          test "$(docker inspect --format='{{.State.Health.Status}}' chat-v2-ci)" != "unhealthy"

          docker run --detach --name chat-v2-auth \
            --publish 127.0.0.1:4181:4174 \
            --env CHAT_AUTH_MODE=token \
            --env CHAT_ACCESS_TOKEN=ci-secret \
            chat-ailucy-v2:ci
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4181/api/health >/dev/null; then
              break
            fi
            sleep 1
          done
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:4181/api/conversations)" = '401'
          curl --fail --silent --header 'Authorization: Bearer ci-secret' http://127.0.0.1:4181/api/conversations >/dev/null
