name: Verify approved staging through Cloudflare

on:
  push:
    branches:
      - agent/staging-deploy-3d2de7e

permissions:
  contents: read
  statuses: write

concurrency:
  group: chat-v2-staging-cloudflare-qa
  cancel-in-progress: false

jobs:
  verify-cloudflare:
    name: Verify Cloudflare Access and public multimodal path
    runs-on: [self-hosted, linux, x64, chat-staging]
    environment: staging
    timeout-minutes: 30

    steps:
      - name: Checkout approved revision
        uses: actions/checkout@v4
        with:
          ref: 3d2de7ecbcfb422dbbc12b918175926326550b59
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify source revision
        id: source
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '3d2de7ecbcfb422dbbc12b918175926326550b59'
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Mark Cloudflare verification pending
        uses: actions/github-script@v7
        env:
          DEPLOY_SHA: ${{ steps.source.outputs.sha }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOY_SHA,
              state: 'pending',
              context: 'chat-v2/cloudflare',
              description: 'Cloudflare Access and public multimodal QA are running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Verify public Cloudflare Access, artifacts, Letta PDF, and Gemma image understanding
        env:
          CHAT_STAGING_BASE_URL: ${{ vars.CHAT_PUBLIC_ORIGIN }}
          CHAT_STAGING_EMAIL: ${{ vars.CHAT_ALLOWED_EMAILS }}
          CHAT_MULTIMODAL_QA_REQUIRED: 'true'
          CHAT_GENERATED_ARTIFACT_QA_REQUIRED: 'false'
          CHAT_HERMES_VISION_AGENT_ID: Gemma
          CF_ACCESS_CLIENT_ID: ${{ vars.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: bash scripts/ops/external-staging-browser-smoke.sh

      - name: Upload Cloudflare evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-cloudflare-evidence-${{ github.run_id }}
          path: |
            test-results-external-staging-browser
            playwright-external-staging-report
          if-no-files-found: warn
          retention-days: 30

      - name: Publish Cloudflare verification status
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOY_SHA: ${{ steps.source.outputs.sha }}
          VERIFY_RESULT: ${{ job.status }}
        with:
          script: |
            const success = process.env.VERIFY_RESULT === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.DEPLOY_SHA,
              state: success ? 'success' : 'failure',
              context: 'chat-v2/cloudflare',
              description: success
                ? 'Cloudflare Access and public multimodal QA passed'
                : 'Cloudflare Access or public multimodal QA failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
