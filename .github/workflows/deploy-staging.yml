name: Diagnose Cloudflare staging authentication

on:
  push:
    branches:
      - agent/staging-deploy-3d2de7e

permissions:
  contents: read
  statuses: write

jobs:
  diagnose-cloudflare:
    name: Diagnose Cloudflare staging authentication
    runs-on: [self-hosted, linux, x64, chat-staging]
    environment: staging
    timeout-minutes: 10

    steps:
      - name: Checkout approved revision
        uses: actions/checkout@v4
        with:
          ref: 3d2de7ecbcfb422dbbc12b918175926326550b59
          clean: true

      - name: Mark diagnostic pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '3d2de7ecbcfb422dbbc12b918175926326550b59',
              state: 'pending',
              context: 'chat-v2/cloudflare-diagnostic',
              description: 'Safe Cloudflare staging diagnostics are running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Collect safe Cloudflare diagnostics
        env:
          CONFIGURED_PUBLIC_ORIGIN: ${{ vars.CHAT_PUBLIC_ORIGIN }}
          CF_ACCESS_CLIENT_ID: ${{ vars.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set +e
          base_url='https://chat-staging.ailucy.online'
          host='chat-staging.ailucy.online'
          : > cloudflare-diagnostic.txt
          bool() { if [[ -n "$1" ]]; then echo true; else echo false; fi; }
          echo "configured_public_origin_set=$(bool "${CONFIGURED_PUBLIC_ORIGIN:-}")" | tee -a cloudflare-diagnostic.txt
          echo "configured_public_origin_is_absolute=$(node -e 'try { const u=new URL(process.argv[1]); process.stdout.write(String(Boolean(u.protocol && u.hostname))); } catch { process.stdout.write("false"); }' "${CONFIGURED_PUBLIC_ORIGIN:-}")" | tee -a cloudflare-diagnostic.txt
          echo "client_id_set=$(bool "${CF_ACCESS_CLIENT_ID:-}")" | tee -a cloudflare-diagnostic.txt
          echo "client_secret_set=$(bool "${CF_ACCESS_CLIENT_SECRET:-}")" | tee -a cloudflare-diagnostic.txt
          if getent ahosts "${host}" >/dev/null 2>&1; then
            echo 'dns_resolves=true' | tee -a cloudflare-diagnostic.txt
          else
            echo 'dns_resolves=false' | tee -a cloudflare-diagnostic.txt
          fi
          unauth="$(curl --silent --show-error --max-time 30 --output /dev/null --write-out '%{http_code}' "${base_url}/api/auth/config")"
          curl_rc=$?
          echo "unauthenticated_curl_ok=$([[ ${curl_rc} -eq 0 ]] && echo true || echo false)" | tee -a cloudflare-diagnostic.txt
          echo "unauthenticated_http=${unauth:-none}" | tee -a cloudflare-diagnostic.txt
          if [[ -n "${CF_ACCESS_CLIENT_ID:-}" && -n "${CF_ACCESS_CLIENT_SECRET:-}" ]]; then
            service="$(curl --silent --show-error --max-time 30 --output /dev/null --write-out '%{http_code}' --header "CF-Access-Client-Id: ${CF_ACCESS_CLIENT_ID}" --header "CF-Access-Client-Secret: ${CF_ACCESS_CLIENT_SECRET}" "${base_url}/api/auth/config")"
            service_rc=$?
            echo "service_authenticated_curl_ok=$([[ ${service_rc} -eq 0 ]] && echo true || echo false)" | tee -a cloudflare-diagnostic.txt
            echo "service_authenticated_http=${service:-none}" | tee -a cloudflare-diagnostic.txt
          else
            echo 'service_authenticated_curl_ok=not_run' | tee -a cloudflare-diagnostic.txt
            echo 'service_authenticated_http=not_run' | tee -a cloudflare-diagnostic.txt
          fi
          exit 0

      - name: Upload safe Cloudflare diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-cloudflare-diagnostic-${{ github.run_id }}
          path: cloudflare-diagnostic.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Publish diagnostic status
        if: always()
        uses: actions/github-script@v7
        env:
          RESULT: ${{ job.status }}
        with:
          script: |
            const success = process.env.RESULT === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '3d2de7ecbcfb422dbbc12b918175926326550b59',
              state: success ? 'success' : 'failure',
              context: 'chat-v2/cloudflare-diagnostic',
              description: success ? 'Safe Cloudflare diagnostics collected' : 'Cloudflare diagnostic collection failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
