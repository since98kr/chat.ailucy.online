name: Letta full CLI runtime CI

on:
  pull_request:
    paths:
      - '.github/workflows/deploy-staging.yml'
      - '.github/workflows/letta-full-runtime-ci.yml'
      - 'ops/letta-bridge/**'
      - 'e2e-staging/letta-full-runtime.spec.ts'
      - 'package.json'
  push:
    branches:
      - main
      - 'agent/**'
    paths:
      - '.github/workflows/deploy-staging.yml'
      - '.github/workflows/letta-full-runtime-ci.yml'
      - 'ops/letta-bridge/**'
      - 'e2e-staging/letta-full-runtime.spec.ts'
      - 'package.json'

permissions:
  contents: write

concurrency:
  group: letta-full-runtime-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bridge:
    name: CLI identity, capabilities, redaction, rollout, restricted SSH, and staging wiring
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply validated slash-command compatibility files to the feature branch
        if: ${{ github.event_name == 'pull_request' && github.head_ref == 'agent/letta-empty-slash-advertisement' }}
        shell: bash
        run: |
          set -euo pipefail
          branch='agent/letta-empty-slash-advertisement'
          git fetch origin "${branch}"
          git checkout -B "${branch}" "origin/${branch}"
          node ops/letta-bridge/apply-empty-slash-compat.mjs --write
          node --check ops/letta-bridge/letta-cli-bridge.mjs
          git diff --check
          targets=(
            ops/letta-bridge/letta-cli-bridge.mjs
            e2e-staging/letta-full-runtime.spec.ts
          )
          if git diff --quiet -- "${targets[@]}"; then
            echo 'Validated slash-command compatibility files are already committed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- "${targets[@]}"
          git commit -m 'Handle empty advertised slash command metadata (#84)'
          git push origin HEAD:"${branch}"

      - name: Validate bridge and operator script syntax
        shell: bash
        run: |
          set -euo pipefail
          node --check ops/letta-bridge/letta-cli-bridge.mjs
          bash -n ops/letta-bridge/install-hni-node-04.sh
          bash -n ops/letta-bridge/deploy-from-agentlucy.sh
          bash -n ops/letta-bridge/deploy-ssh-diagnostics.nodecheck.sh
          bash -n ops/letta-bridge/rollout-user-owned.sh
          bash -n ops/letta-bridge/rollout-user-owned.nodecheck.sh
          bash -n ops/letta-bridge/authorized-rollout-gate.sh
          bash -n ops/letta-bridge/authorized-rollout-gate.nodecheck.sh
          bash -n ops/letta-bridge/bootstrap-staging-ssh-access.sh
          bash -n ops/letta-bridge/configure-github-staging.sh

      - name: Validate full-runtime static guards
        shell: bash
        run: |
          set -euo pipefail
          bridge='ops/letta-bridge/letta-cli-bridge.mjs'
          installer='ops/letta-bridge/install-hni-node-04.sh'
          deploy='ops/letta-bridge/deploy-from-agentlucy.sh'
          rollout='ops/letta-bridge/rollout-user-owned.sh'
          gate='ops/letta-bridge/authorized-rollout-gate.sh'
          bootstrap='ops/letta-bridge/bootstrap-staging-ssh-access.sh'
          workflow='.github/workflows/deploy-staging.yml'
          qa='e2e-staging/letta-full-runtime.spec.ts'

          grep -Fq 'full-cli-runtime' "${bridge}"
          grep -Fq 'wire?.skill_sources' "${bridge}"
          grep -Fq 'wire?.slash_commands' "${bridge}"
          grep -Fq 'wire?.mcp_servers' "${bridge}"
          grep -Fq 'wire?.permission_mode' "${bridge}"
          grep -Fq 'wire?.memfs_enabled' "${bridge}"
          grep -Fq 'letta-cli-bridge.mjs' "${installer}"
          grep -Fq 'ExecStart=${NODE_BIN} ${INSTALL_DIR}/letta-cli-bridge.mjs' "${installer}"
          grep -Fq 'letta-preflight-v1' "${deploy}"
          grep -Fq 'letta-rollout-v1' "${deploy}"
          grep -Fq 'Full CLI bridge rollout completed without sudo' "${rollout}"
          grep -Fq 'SSH_ORIGINAL_COMMAND' "${gate}"
          grep -Fq 'payload must contain exactly letta-cli-bridge.mjs' "${gate}"
          grep -Fq 'restrict,command=' "${bootstrap}"
          grep -Fq 'ssh-keygen -F' "${bootstrap}"
          grep -Fq 'gh secret set LETTA_SSH_PRIVATE_KEY' "${bootstrap}"
          grep -Fq 'gh secret set LETTA_SSH_KNOWN_HOSTS' "${bootstrap}"
          grep -Fq 'gh workflow run deploy-staging.yml' "${bootstrap}"
          grep -Fq 'ssh-authentication' "${deploy}"
          grep -Fq 'ssh-host-key-verification' "${deploy}"
          grep -Fq 'ssh-connectivity' "${deploy}"
          grep -Fq 'LETTA_SSH_PRIVATE_KEY' "${workflow}"
          grep -Fq 'LETTA_SSH_KNOWN_HOSTS' "${workflow}"
          grep -Fq 'letta-bridge-deploy-diagnostic.json' "${workflow}"
          if grep -Eq '[[:space:]]sudo[[:space:]]' "${deploy}" "${gate}" "${bootstrap}"; then
            echo 'restricted staging SSH path must not use sudo' >&2
            exit 1
          fi
          if grep -Fq 'ssh-keyscan' "${bootstrap}"; then
            echo 'bootstrap must reuse an existing trusted known_hosts entry, not trust ssh-keyscan output' >&2
            exit 1
          fi
          if grep -Fq "'--memfs-startup', 'skip'" "${bridge}"; then
            echo 'full bridge must not force MemFS startup to skip' >&2
            exit 1
          fi
          grep -Fq 'Deploy full Letta CLI runtime bridge' "${workflow}"
          grep -Fq 'CHAT_LETTA_FULL_RUNTIME_QA_REQUIRED' "${workflow}"
          grep -Fq 'Capture authenticated Letta runtime capabilities' "${workflow}"
          grep -Fq 'capabilityStatus?.tools' "${qa}"
          grep -Fq 'capabilityStatus?.skillSources' "${qa}"
          grep -Fq 'capabilityStatus?.mcp' "${qa}"
          grep -Fq 'capabilityStatus?.commands' "${qa}"
          grep -Fq 'capabilityStatus?.memfs' "${qa}"
          grep -Fq 'tool.completed:' "${qa}"

      - name: Exercise explicit empty slash-command metadata contract
        run: node --test ops/letta-bridge/letta-empty-slash.nodecheck.mjs

      - name: Exercise full bridge capability contract
        run: node --test ops/letta-bridge/letta-full-bridge.nodecheck.mjs

      - name: Exercise remaining runtime identity, capability, session, and redaction contracts
        run: |
          set -euo pipefail
          files=()
          for file in ops/letta-bridge/*.nodecheck.mjs; do
            case "${file}" in
              *letta-empty-slash.nodecheck.mjs|*letta-full-bridge.nodecheck.mjs) ;;
              *) files+=("${file}") ;;
            esac
          done
          node --test "${files[@]}"

      - name: Exercise atomic user-owned rollout and rollback
        run: bash ops/letta-bridge/rollout-user-owned.nodecheck.sh

      - name: Exercise restricted forced-command gate
        run: bash ops/letta-bridge/authorized-rollout-gate.nodecheck.sh

      - name: Exercise SSH identity files and non-secret failure classification
        run: bash ops/letta-bridge/deploy-ssh-diagnostics.nodecheck.sh
