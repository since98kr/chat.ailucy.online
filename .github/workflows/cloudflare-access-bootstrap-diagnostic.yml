name: Cloudflare Access staging bootstrap diagnostic

on:
  push:
    branches:
      - ops/cloudflare-access-bootstrap

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    name: Diagnose and test staging Access automation
    runs-on: [self-hosted, linux, x64, chat-staging]
    environment: staging
    timeout-minutes: 10
    steps:
      - name: Checkout bootstrap controller
        uses: actions/checkout@v4
        with:
          ref: ops/cloudflare-access-bootstrap
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate and test the idempotent bootstrap
        run: |
          set -euo pipefail
          node --check scripts/ops/bootstrap-cloudflare-staging-access.mjs
          node --test scripts/ops/bootstrap-cloudflare-staging-access.test.mjs

      - name: Inspect public hostname and Access endpoints
        env:
          CHAT_PUBLIC_ORIGIN: https://chat-staging.ailucy.online
        run: |
          set -u
          for path in / /api/auth/session /cdn-cgi/access/login; do
            headers="$(mktemp)"
            status="$(curl --silent --show-error --max-time 30 --max-redirs 0 \
              --dump-header "${headers}" --output /dev/null --write-out '%{http_code}' \
              "${CHAT_PUBLIC_ORIGIN}${path}" || true)"
            location="$(awk 'BEGIN{IGNORECASE=1} /^location:/ {sub(/^[^:]+:[[:space:]]*/,""); sub(/\r$/,""); print; exit}' "${headers}")"
            content_type="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/ {sub(/^[^:]+:[[:space:]]*/,""); sub(/\r$/,""); print; exit}' "${headers}")"
            rm -f "${headers}"
            printf 'path=%s status=%s redirect=%s content-type=%s\n' \
              "${path}" "${status:-none}" "$([[ -n "${location}" ]] && echo true || echo false)" "${content_type:-unknown}"
            if [[ -n "${location}" ]]; then
              node -e '
                const url = new URL(process.argv[1]);
                const audience = url.searchParams.get("aud") || url.searchParams.get("kid") || "";
                console.log(`redirect-origin=${url.origin}`);
                console.log(`redirect-audience-present=${Boolean(audience)}`);
              ' "${location}"
            fi
          done

      - name: Report credential-source readiness without revealing values
        if: always()
        env:
          CF_ACCESS_CLIENT_SECRET_VALUE: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          CLOUDFLARE_API_TOKEN_VALUE: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID_VALUE: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          local_service_file=false
          for candidate in \
            /opt/chat-v2/staging/secrets/cloudflare-access-staging.json \
            /opt/chat-v2/staging/secrets/cloudflare-service-token.env \
            /opt/chat-v2/staging/.cloudflare-service-token.env \
            /etc/cloudflared/chat-v2-staging-service-token.env; do
            [[ -s "${candidate}" ]] && local_service_file=true
          done
          printf 'service-secret-environment=%s\n' "$([[ -n "${CF_ACCESS_CLIENT_SECRET_VALUE}" ]] && echo true || echo false)"
          printf 'service-token-local-file=%s\n' "${local_service_file}"
          printf 'admin-api-token-environment=%s\n' "$([[ -n "${CLOUDFLARE_API_TOKEN_VALUE}" ]] && echo true || echo false)"
          printf 'account-id-environment=%s\n' "$([[ -n "${CLOUDFLARE_ACCOUNT_ID_VALUE}" ]] && echo true || echo false)"

      - name: Inventory credential references in restricted configuration paths
        if: always()
        run: |
          set -euo pipefail
          found=false
          for root in /opt/chat-v2/staging /etc/cloudflared /home/since98kr /home/node; do
            [[ -d "${root}" ]] || continue
            while IFS= read -r -d '' file; do
              if grep -IlE 'CF_ACCESS_CLIENT_SECRET|CLOUDFLARE_API_TOKEN|CF_API_TOKEN|a12fba8e18fb4e9540782d70d3cf4fee\.access' "${file}" >/dev/null 2>&1; then
                printf 'credential-reference-file=%s\n' "${file}"
                found=true
              fi
            done < <(find "${root}" -xdev -type f -readable -size -1048576c \
              ! -path '*/node_modules/*' ! -path '*/.git/*' ! -path '*/data/artifacts/*' \
              -print0 2>/dev/null)
          done
          printf 'credential-reference-found=%s\n' "${found}"

      - name: Publish diagnostic status
        if: always()
        uses: actions/github-script@v7
        env:
          RESULT: ${{ job.status }}
        with:
          script: |
            const success = process.env.RESULT === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'chat-v2/cloudflare-bootstrap',
              description: success ? 'Access bootstrap tested and inputs diagnosed' : 'Access bootstrap test or diagnostic failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
