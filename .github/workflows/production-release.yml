name: Production release gate

on:
  workflow_dispatch:
    inputs:
      revision:
        description: Full 40-character commit SHA to verify or deploy
        required: true
        type: string
      mode:
        description: Preflight builds and validates only; deploy may replace production after approval
        required: true
        default: preflight
        type: choice
        options:
          - preflight
          - deploy
      confirm:
        description: For deploy only, enter DEPLOY_CHAT_V2_PRODUCTION
        required: false
        type: string

permissions:
  contents: read
  statuses: write

concurrency:
  group: chat-v2-production-release
  cancel-in-progress: false

jobs:
  production:
    name: Verify or release production
    runs-on: [self-hosted, linux, x64, chat-production]
    environment: production
    timeout-minutes: 120

    steps:
      - name: Validate immutable release inputs
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.revision }}
          RELEASE_MODE: ${{ inputs.mode }}
          RELEASE_CONFIRM: ${{ inputs.confirm }}
          RELEASE_ENABLED: ${{ vars.CHAT_PRODUCTION_RELEASE_ENABLED }}
        run: |
          set -euo pipefail
          [[ "${REQUESTED_SHA}" =~ ^[0-9a-f]{40}$ ]] || {
            echo 'revision must be a full 40-character commit SHA' >&2
            exit 1
          }
          if [[ "${RELEASE_MODE}" == 'deploy' ]]; then
            [[ "${RELEASE_ENABLED,,}" == 'true' ]] || {
              echo 'CHAT_PRODUCTION_RELEASE_ENABLED must be true in the production Environment' >&2
              exit 1
            }
            [[ "${RELEASE_CONFIRM}" == 'DEPLOY_CHAT_V2_PRODUCTION' ]] || {
              echo 'typed production confirmation did not match' >&2
              exit 1
            }
          fi

      - name: Checkout immutable revision
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.revision }}
          clean: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify exact source and workflow tooling are on main
        id: source
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.revision }}
          TOOLING_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          ACTUAL_SHA="$(git rev-parse HEAD)"
          [[ "${ACTUAL_SHA}" == "${REQUESTED_SHA}" ]]
          [[ "${TOOLING_SHA}" =~ ^[0-9a-f]{40}$ ]]
          test -z "$(git status --short)"
          git fetch --no-tags origin main
          git cat-file -e "${TOOLING_SHA}^{commit}"
          git merge-base --is-ancestor "${ACTUAL_SHA}" origin/main || {
            echo 'requested production revision is not contained in main history' >&2
            exit 1
          }
          git merge-base --is-ancestor "${TOOLING_SHA}" origin/main || {
            echo 'production workflow tooling SHA is not contained in main history' >&2
            exit 1
          }
          echo "sha=${ACTUAL_SHA}" >> "$GITHUB_OUTPUT"
          echo "tooling_sha=${TOOLING_SHA}" >> "$GITHUB_OUTPUT"

      - name: Mark production gate pending
        uses: actions/github-script@v7
        env:
          RELEASE_SHA: ${{ steps.source.outputs.sha }}
          RELEASE_MODE: ${{ inputs.mode }}
        with:
          script: |
            const deploy = process.env.RELEASE_MODE === 'deploy';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.RELEASE_SHA,
              state: 'pending',
              context: deploy ? 'chat-v2/production-release' : 'chat-v2/production-readiness',
              description: deploy ? 'Production release gate is running' : 'Production preflight is running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Validate deploy rollback prerequisites
        if: ${{ inputs.mode == 'deploy' }}
        shell: bash
        env:
          RELEASE_SHA: ${{ steps.source.outputs.sha }}
          TOOLING_SHA: ${{ steps.source.outputs.tooling_sha }}
          CHAT_PRODUCTION_ROOT: ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}
          CHAT_PRODUCTION_DATA_DIR: ${{ vars.CHAT_PRODUCTION_DATA_DIR || '/opt/chat-v2/production/data' }}
          CHAT_PRODUCTION_ALLOW_INITIAL_RELEASE: ${{ vars.CHAT_PRODUCTION_ALLOW_INITIAL_RELEASE || 'false' }}
          CHAT_PRODUCTION_INITIAL_RELEASE_APPROVED_SHA: ${{ vars.CHAT_PRODUCTION_INITIAL_RELEASE_APPROVED_SHA }}
        run: |
          set -euo pipefail
          evidence_dir="${RUNNER_TEMP}/chat-v2-production-evidence"
          tool="${RUNNER_TEMP}/production-deploy-prerequisites.sh"
          mkdir -p "${evidence_dir}"
          git show "${TOOLING_SHA}:scripts/ops/production-deploy-prerequisites.sh" >"${tool}"
          bash -n "${tool}"
          bash "${tool}" "${RELEASE_SHA}" "${evidence_dir}/rollback-prerequisites.json"

      - name: Build, preflight, and conditionally deploy
        env:
          CHAT_PRODUCTION_MODE: ${{ inputs.mode }}
          CHAT_PRODUCTION_CONFIRM: ${{ inputs.confirm }}
          CHAT_PRODUCTION_APPROVED_SHA: ${{ vars.CHAT_PRODUCTION_APPROVED_SHA }}
          CHAT_PRODUCTION_ROOT: ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}
          CHAT_PRODUCTION_DATA_DIR: ${{ vars.CHAT_PRODUCTION_DATA_DIR || '/opt/chat-v2/production/data' }}
          CHAT_PRODUCTION_PORT: ${{ vars.CHAT_PRODUCTION_PORT }}
          CHAT_PRODUCTION_CONTAINER_NAME: ${{ vars.CHAT_PRODUCTION_CONTAINER_NAME || 'chat-v2-production' }}
          CHAT_PRODUCTION_COMPOSE_PROJECT: ${{ vars.CHAT_PRODUCTION_COMPOSE_PROJECT || 'chat-v2-production' }}
          CHAT_ENVIRONMENT: production
          CHAT_PREFLIGHT_STRICT: 'true'
          CHAT_PREFLIGHT_MIN_FREE_BYTES: ${{ vars.CHAT_PREFLIGHT_MIN_FREE_BYTES }}
          CHAT_BACKUP_RETENTION: ${{ vars.CHAT_BACKUP_RETENTION }}
          CHAT_PUBLIC_ORIGIN: ${{ vars.CHAT_PUBLIC_ORIGIN }}
          CHAT_ALLOWED_ORIGIN: ${{ vars.CHAT_ALLOWED_ORIGIN }}
          CHAT_AUTH_MODE: ${{ vars.CHAT_AUTH_MODE }}
          CHAT_ALLOWED_EMAILS: ${{ vars.CHAT_ALLOWED_EMAILS }}
          CHAT_ALLOWED_SERVICE_CLIENT_IDS: ${{ vars.CHAT_ALLOWED_SERVICE_CLIENT_IDS }}
          CHAT_CF_ACCESS_ISSUER: ${{ vars.CHAT_CF_ACCESS_ISSUER }}
          CHAT_CF_ACCESS_AUD: ${{ vars.CHAT_CF_ACCESS_AUD }}
          CHAT_ACCESS_TOKEN: ${{ secrets.CHAT_ACCESS_TOKEN }}
          CHAT_RATE_LIMIT_GENERAL: ${{ vars.CHAT_RATE_LIMIT_GENERAL }}
          CHAT_RATE_LIMIT_CHAT: ${{ vars.CHAT_RATE_LIMIT_CHAT }}
          CHAT_RATE_LIMIT_UPLOAD: ${{ vars.CHAT_RATE_LIMIT_UPLOAD }}
          CHAT_MAX_UPLOAD_BYTES: ${{ vars.CHAT_MAX_UPLOAD_BYTES }}
          CHAT_MAX_GENERATED_ARTIFACT_BYTES: ${{ vars.CHAT_MAX_GENERATED_ARTIFACT_BYTES }}
          CHAT_MAX_INLINE_GENERATED_ARTIFACT_PAYLOAD_BYTES: ${{ vars.CHAT_MAX_INLINE_GENERATED_ARTIFACT_PAYLOAD_BYTES }}
          CHAT_MAX_EXTRACTED_TEXT_CHARACTERS: ${{ vars.CHAT_MAX_EXTRACTED_TEXT_CHARACTERS }}
          CHAT_MAX_PDF_PAGES: ${{ vars.CHAT_MAX_PDF_PAGES }}
          LETTA_BASE_URL: ${{ vars.LETTA_BASE_URL }}
          LETTA_CHAT_PATH: ${{ vars.LETTA_CHAT_PATH }}
          LETTA_HEALTH_PATH: ${{ vars.LETTA_HEALTH_PATH }}
          LETTA_AGENT_ID: ${{ vars.LETTA_AGENT_ID }}
          LETTA_API_KEY: ${{ secrets.LETTA_API_KEY }}
          LETTA_TIMEOUT_MS: ${{ vars.LETTA_TIMEOUT_MS }}
          LETTA_PROTOCOL: ${{ vars.LETTA_PROTOCOL }}
          LETTA_MODEL_MAP_JSON: ${{ vars.LETTA_MODEL_MAP_JSON }}
          LETTA_MAX_ARTIFACT_BYTES: ${{ vars.LETTA_MAX_ARTIFACT_BYTES }}
          LETTA_MAX_ARTIFACT_TOTAL_BYTES: ${{ vars.LETTA_MAX_ARTIFACT_TOTAL_BYTES }}
          LETTA_MAX_TEXT_ARTIFACT_BYTES: ${{ vars.LETTA_MAX_TEXT_ARTIFACT_BYTES }}
          LETTA_NATIVE_BINARY_ARTIFACTS: ${{ vars.LETTA_NATIVE_BINARY_ARTIFACTS }}
          LETTA_ARTIFACT_TOOL_ENABLED: ${{ vars.LETTA_ARTIFACT_TOOL_ENABLED }}
          HERMES_BASE_URL: ${{ vars.HERMES_BASE_URL }}
          HERMES_CHAT_PATH: ${{ vars.HERMES_CHAT_PATH }}
          HERMES_HEALTH_PATH: ${{ vars.HERMES_HEALTH_PATH }}
          HERMES_AGENT_ID: ${{ vars.HERMES_AGENT_ID }}
          HERMES_API_KEY: ${{ secrets.HERMES_API_KEY }}
          HERMES_TIMEOUT_MS: ${{ vars.HERMES_TIMEOUT_MS }}
          HERMES_PROTOCOL: ${{ vars.HERMES_PROTOCOL }}
          HERMES_MODEL_MAP_JSON: ${{ vars.HERMES_MODEL_MAP_JSON }}
          HERMES_MAX_ARTIFACT_BYTES: ${{ vars.HERMES_MAX_ARTIFACT_BYTES }}
          HERMES_MAX_ARTIFACT_TOTAL_BYTES: ${{ vars.HERMES_MAX_ARTIFACT_TOTAL_BYTES }}
          HERMES_ARTIFACT_TOOL_ENABLED: ${{ vars.HERMES_ARTIFACT_TOOL_ENABLED }}
          HERMES_ARTIFACT_ENVELOPE_ENABLED: ${{ vars.HERMES_ARTIFACT_ENVELOPE_ENABLED }}
          HERMES_DOCKER_NETWORK: ${{ vars.HERMES_DOCKER_NETWORK }}
        run: bash scripts/deploy/production.sh "${{ steps.source.outputs.sha }}"

      - name: Verify local production application paths
        if: ${{ inputs.mode == 'deploy' }}
        env:
          RELEASE_SHA: ${{ steps.source.outputs.sha }}
          TOOLING_SHA: ${{ steps.source.outputs.tooling_sha }}
          CHAT_STAGING_EMAIL: ${{ vars.CHAT_ALLOWED_EMAILS }}
          CHAT_MULTIMODAL_QA_REQUIRED: 'true'
          CHAT_GENERATED_ARTIFACT_QA_REQUIRED: 'true'
          CHAT_HERMES_VISION_AGENT_ID: ${{ vars.CHAT_HERMES_VISION_AGENT_ID }}
          CHAT_PRODUCTION_PORT: ${{ vars.CHAT_PRODUCTION_PORT }}
        run: |
          set -euo pipefail
          env -u CF_ACCESS_CLIENT_ID -u CF_ACCESS_CLIENT_SECRET \
            CHAT_STAGING_BASE_URL="http://127.0.0.1:${CHAT_PRODUCTION_PORT}" \
            bash scripts/ops/staging-smoke.sh
          env -u CF_ACCESS_CLIENT_ID -u CF_ACCESS_CLIENT_SECRET \
            CHAT_STAGING_BASE_URL="http://127.0.0.1:${CHAT_PRODUCTION_PORT}" \
            bash scripts/ops/staging-browser-smoke.sh

          evidence_dir="${RUNNER_TEMP}/chat-v2-production-evidence"
          tool="${RUNNER_TEMP}/write-production-e2e-marker.sh"
          mkdir -p "${evidence_dir}"
          git show "${TOOLING_SHA}:scripts/ops/write-production-e2e-marker.sh" >"${tool}"
          bash -n "${tool}"
          bash "${tool}" local "${RELEASE_SHA}" "${GITHUB_RUN_ID}" "${evidence_dir}/local-e2e.json"

      - name: Verify public production Cloudflare path
        if: ${{ inputs.mode == 'deploy' }}
        env:
          RELEASE_SHA: ${{ steps.source.outputs.sha }}
          TOOLING_SHA: ${{ steps.source.outputs.tooling_sha }}
          CHAT_PUBLIC_ORIGIN: ${{ vars.CHAT_PUBLIC_ORIGIN }}
          CHAT_STAGING_BASE_URL: ${{ vars.CHAT_PUBLIC_ORIGIN }}
          CHAT_EXTERNAL_QA_REQUIRED: 'true'
          CHAT_MULTIMODAL_QA_REQUIRED: 'true'
          CHAT_GENERATED_ARTIFACT_QA_REQUIRED: 'true'
          CHAT_HERMES_VISION_AGENT_ID: ${{ vars.CHAT_HERMES_VISION_AGENT_ID }}
          CF_ACCESS_CLIENT_ID: ${{ vars.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          bash scripts/ops/external-staging-browser-smoke.sh

          evidence_dir="${RUNNER_TEMP}/chat-v2-production-evidence"
          tool="${RUNNER_TEMP}/write-production-e2e-marker.sh"
          mkdir -p "${evidence_dir}"
          git show "${TOOLING_SHA}:scripts/ops/write-production-e2e-marker.sh" >"${tool}"
          bash -n "${tool}"
          bash "${tool}" public "${RELEASE_SHA}" "${GITHUB_RUN_ID}" "${evidence_dir}/public-e2e.json"

      - name: Publish production gate summary
        if: always()
        shell: bash
        env:
          RELEASE_MODE: ${{ inputs.mode }}
          RELEASE_SHA: ${{ steps.source.outputs.sha }}
          TOOLING_SHA: ${{ steps.source.outputs.tooling_sha }}
          PRODUCTION_ROOT: ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}
          PRODUCTION_PUBLIC_ORIGIN: ${{ vars.CHAT_PUBLIC_ORIGIN }}
        run: |
          {
            echo '## Chat V2 production gate'
            echo
            echo "- Mode: \`${RELEASE_MODE}\`"
            echo "- Revision: \`${RELEASE_SHA}\`"
            echo "- Workflow tooling: \`${TOOLING_SHA}\`"
            echo "- Production root: \`${PRODUCTION_ROOT}\`"
            echo "- Public origin: \`${PRODUCTION_PUBLIC_ORIGIN}\`"
            echo '- Automatic main-push deployment: `disabled`'
            marker="${RUNNER_TEMP}/chat-v2-production-evidence/rollback-prerequisites.json"
            if [[ -f "${marker}" ]]; then
              echo "- Rollback prerequisite mode: \`$(node -p "require('${marker}').mode")\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-v2-production-${{ inputs.mode }}-${{ github.run_id }}
          path: |
            ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}/state/last-production-readiness.json
            ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}/state/last-preflight.json
            ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}/state/last-preflight-output.log
            ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}/state/last-backup.json
            ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}/state/last-backup-verify.json
            ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}/state/last-health.json
            ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}/state/last-ops-status.json
            ${{ vars.CHAT_PRODUCTION_ROOT || '/opt/chat-v2/production' }}/state/last-deployment.json
            ${{ runner.temp }}/chat-v2-production-evidence/*.json
            test-results-staging-browser
            playwright-staging-report
            test-results-external-staging-browser
            playwright-external-staging-report
          if-no-files-found: warn
          retention-days: 30

      - name: Publish production gate result
        if: always()
        uses: actions/github-script@v7
        env:
          RELEASE_SHA: ${{ steps.source.outputs.sha }}
          RELEASE_MODE: ${{ inputs.mode }}
          RELEASE_RESULT: ${{ job.status }}
        with:
          script: |
            if (!process.env.RELEASE_SHA) return;
            const deploy = process.env.RELEASE_MODE === 'deploy';
            const success = process.env.RELEASE_RESULT === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.RELEASE_SHA,
              state: success ? 'success' : 'failure',
              context: deploy ? 'chat-v2/production-release' : 'chat-v2/production-readiness',
              description: success
                ? (deploy ? 'Production release and required E2E passed' : 'Production preflight passed without replacement')
                : (deploy ? 'Production release or required E2E failed' : 'Production preflight failed'),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
