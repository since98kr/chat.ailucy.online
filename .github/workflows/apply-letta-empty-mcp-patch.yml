name: Apply Letta empty MCP compatibility patch

on:
  push:
    branches:
      - agent/letta-empty-mcp-advertisement
    paths:
      - '.github/workflows/apply-letta-empty-mcp-patch.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-letta-empty-mcp-patch.yml'
      - '.github/patches/letta-empty-mcp-advertisement.patch'

permissions:
  contents: write

concurrency:
  group: apply-letta-empty-mcp-patch
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: agent/letta-empty-mcp-advertisement
          fetch-depth: 0

      - name: Apply reviewed compatibility edits and push
        shell: bash
        run: |
          set -euo pipefail
          if grep -Fq 'mcpAdvertised' ops/letta-bridge/letta-cli-bridge.mjs; then
            echo 'Reviewed MCP compatibility edits are already applied.'
            exit 0
          fi

          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one replacement target, found {count}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          bridge = 'ops/letta-bridge/letta-cli-bridge.mjs'
          replace_once(
              bridge,
              "  return [...deduped.values()].slice(0, MAX_CAPABILITY_ITEMS);\n}\n\nexport function loadConfig",
              "  return [...deduped.values()].slice(0, MAX_CAPABILITY_ITEMS);\n}\n\nfunction withMcpAdvertisement(capabilities, advertised) {\n  Object.defineProperty(capabilities, 'mcpAdvertised', {\n    value: advertised === true,\n    enumerable: false,\n    configurable: true,\n    writable: true,\n  });\n  return capabilities;\n}\n\nexport function loadConfig",
          )
          replace_once(
              bridge,
              """export function extractRuntimeCapabilities(wire, fallbackModel = '') {
  const skillSources = Array.isArray(wire?.skill_sources)
    ? [...new Set(wire.skill_sources.filter((source) => SKILL_SOURCES.has(source)))]
    : [];
  return {
    model: safeLabel(wire?.model) || safeLabel(wire?.model_id) || safeLabel(fallbackModel) || null,
    tools: uniqueLabels(Array.isArray(wire?.tools) ? wire.tools : []),
    skillSources,
    slashCommands: uniqueLabels(Array.isArray(wire?.slash_commands) ? wire.slash_commands : []),
    mcpServers: normalizeMcpServers(wire?.mcp_servers),
    permissionMode: safeLabel(wire?.permission_mode) || null,
    memfsEnabled: typeof wire?.memfs_enabled === 'boolean' ? wire.memfs_enabled : null,
    sessionId: safeLabel(wire?.session_id) || null,
  };
}
""",
              """export function extractRuntimeCapabilities(wire, fallbackModel = '') {
  const skillSources = Array.isArray(wire?.skill_sources)
    ? [...new Set(wire.skill_sources.filter((source) => SKILL_SOURCES.has(source)))]
    : [];
  return withMcpAdvertisement({
    model: safeLabel(wire?.model) || safeLabel(wire?.model_id) || safeLabel(fallbackModel) || null,
    tools: uniqueLabels(Array.isArray(wire?.tools) ? wire.tools : []),
    skillSources,
    slashCommands: uniqueLabels(Array.isArray(wire?.slash_commands) ? wire.slash_commands : []),
    mcpServers: normalizeMcpServers(wire?.mcp_servers),
    permissionMode: safeLabel(wire?.permission_mode) || null,
    memfsEnabled: typeof wire?.memfs_enabled === 'boolean' ? wire.memfs_enabled : null,
    sessionId: safeLabel(wire?.session_id) || null,
  }, Array.isArray(wire?.mcp_servers));
}
""",
          )
          replace_once(
              bridge,
              """function mergeCapabilities(left, right) {
  const mcp = new Map();
  for (const item of [...(left.mcpServers || []), ...(right.mcpServers || [])]) mcp.set(item.name, item);
  return {
    model: right.model || left.model || null,
    tools: uniqueLabels([...(left.tools || []), ...(right.tools || [])]),
    skillSources: [...new Set([...(left.skillSources || []), ...(right.skillSources || [])])],
    slashCommands: uniqueLabels([...(left.slashCommands || []), ...(right.slashCommands || [])]),
    mcpServers: [...mcp.values()].slice(0, MAX_CAPABILITY_ITEMS),
    permissionMode: right.permissionMode || left.permissionMode || null,
    memfsEnabled: right.memfsEnabled ?? left.memfsEnabled ?? null,
    sessionId: right.sessionId || left.sessionId || null,
  };
}
""",
              """function mergeCapabilities(left, right) {
  const mcp = new Map();
  for (const item of [...(left.mcpServers || []), ...(right.mcpServers || [])]) mcp.set(item.name, item);
  return withMcpAdvertisement({
    model: right.model || left.model || null,
    tools: uniqueLabels([...(left.tools || []), ...(right.tools || [])]),
    skillSources: [...new Set([...(left.skillSources || []), ...(right.skillSources || [])])],
    slashCommands: uniqueLabels([...(left.slashCommands || []), ...(right.slashCommands || [])]),
    mcpServers: [...mcp.values()].slice(0, MAX_CAPABILITY_ITEMS),
    permissionMode: right.permissionMode || left.permissionMode || null,
    memfsEnabled: right.memfsEnabled ?? left.memfsEnabled ?? null,
    sessionId: right.sessionId || left.sessionId || null,
  }, left.mcpAdvertised === true || right.mcpAdvertised === true);
}
""",
          )
          replace_once(
              bridge,
              "  if (config.requireMcpServers && capabilities.mcpServers.length === 0) throw new Error('Lucy CLI runtime did not advertise any MCP servers');",
              "  if (config.requireMcpServers && capabilities.mcpServers.length === 0 && capabilities.mcpAdvertised !== true) {\n    throw new Error('Lucy CLI runtime did not advertise MCP capability metadata');\n  }",
          )
          replace_once(bridge, "    mcp_servers: capabilities.mcpServers,\n    permission_mode:", "    mcp_servers: capabilities.mcpServers,\n    mcp_advertised: capabilities.mcpAdvertised === true,\n    permission_mode:")
          replace_once(bridge, "    mcp_server_count: capabilities.mcpServers.length,\n    permission_mode:", "    mcp_server_count: capabilities.mcpServers.length,\n    mcp_advertised: capabilities.mcpAdvertised === true,\n    permission_mode:")
          replace_once(
              bridge,
              "    `MCP servers: ${listForPrompt(mcp)}`,\n    'Use the CLI runtime tools, skills, subagents, and MCP servers whenever they are useful. They execute inside this same CLI process under its existing permissions policy.',",
              "    `MCP servers: ${listForPrompt(mcp)}`,\n    `MCP metadata advertised by headless runtime: ${capabilities.mcpAdvertised === true ? 'true' : 'false'}`,\n    'Use the CLI runtime tools, skills, subagents, and any advertised MCP servers whenever they are useful. They execute inside this same CLI process under its existing permissions policy.',",
          )
          replace_once(bridge, "      tools: [], skillSources: [], slashCommands: [], mcpServers: [],\n      permissionMode:", "      tools: [], skillSources: [], slashCommands: [], mcpServers: [],\n      mcpAdvertised: false,\n      permissionMode:")
          replace_once(bridge, "    onItem({ status: `runtime.permission:${summary.permission_mode || 'unknown'}` });\n    onItem({ status: `runtime.capabilities:", "    onItem({ status: `runtime.permission:${summary.permission_mode || 'unknown'}` });\n    onItem({ status: `runtime.mcp_advertised:${summary.mcp_advertised === true}` });\n    onItem({ status: `runtime.capabilities:")
          replace_once(bridge, "      tools: [], skillSources: [], slashCommands: [], mcpServers: [],\n      permissionMode: null, memfsEnabled: null, sessionId: null,\n    });", "      tools: [], skillSources: [], slashCommands: [], mcpServers: [],\n      mcpAdvertised: false,\n      permissionMode: null, memfsEnabled: null, sessionId: null,\n    });")

          replace_once(
              'e2e-staging/letta-full-runtime.spec.ts',
              "    expect(capabilityStatus?.mcp).toBeGreaterThan(0);",
              "    expect(capabilityStatus?.mcp).toBeGreaterThanOrEqual(0);\n    expect(statuses).toContain('runtime.mcp_advertised:true');",
          )

          workflow = '.github/workflows/deploy-staging.yml'
          replace_once(
              workflow,
              "          const mcpHealthy = Array.isArray(value.mcp_servers)\n            && value.mcp_servers.length > 0\n            && value.mcp_servers.every((server) => server && typeof server.name === 'string'",
              "          const mcpHealthy = Array.isArray(value.mcp_servers)\n            && value.mcp_advertised === true\n            && value.mcp_servers.every((server) => server && typeof server.name === 'string'",
          )
          replace_once(
              workflow,
              "            echo '- Required Letta gates: exact model, permission mode, MemFS, tools, skill sources, slash commands, healthy MCP servers, and real tool execution'",
              "            echo '- Required Letta gates: exact model, permission mode, MemFS, tools, skill sources, slash commands, explicit MCP metadata with any configured servers healthy, and real tool execution'",
          )
          PY

          node --check ops/letta-bridge/letta-cli-bridge.mjs
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ops/letta-bridge/letta-cli-bridge.mjs e2e-staging/letta-full-runtime.spec.ts .github/workflows/deploy-staging.yml
          git commit -m 'Handle empty advertised MCP metadata [mcp-patch-applied] (#82)'
          git push origin HEAD:agent/letta-empty-mcp-advertisement
