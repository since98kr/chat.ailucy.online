services:
  chat-v2-staging:
    image: ${CHAT_IMAGE:?CHAT_IMAGE is required}
    container_name: chat-v2-staging
    restart: unless-stopped
    init: true
    user: "${CHAT_RUNTIME_UID:-1000}:${CHAT_RUNTIME_GID:-1000}"
    ports:
      - "127.0.0.1:${CHAT_STAGING_PORT:-14174}:4174"
    environment:
      NODE_ENV: production
      CHAT_ENVIRONMENT: staging
      CHAT_API_PORT: 4174
      CHAT_DB_PATH: /data/chat-v2.sqlite
      CHAT_ARTIFACT_ROOT: /data/artifacts
      CHAT_BACKUP_ROOT: /data/backups
      CHAT_BACKUP_RETENTION: ${CHAT_BACKUP_RETENTION:-10}
      CHAT_WEB_ROOT: /app/dist
      CHAT_PUBLIC_ORIGIN: ${CHAT_PUBLIC_ORIGIN:-}
      CHAT_ALLOWED_ORIGIN: ${CHAT_ALLOWED_ORIGIN:-}
      CHAT_AUTH_MODE: ${CHAT_AUTH_MODE:-disabled}
      CHAT_ALLOWED_EMAILS: ${CHAT_ALLOWED_EMAILS:-}
      CHAT_ACCESS_TOKEN: ${CHAT_ACCESS_TOKEN:-}
      CHAT_RATE_LIMIT_GENERAL: ${CHAT_RATE_LIMIT_GENERAL:-300}
      CHAT_RATE_LIMIT_CHAT: ${CHAT_RATE_LIMIT_CHAT:-30}
      CHAT_RATE_LIMIT_UPLOAD: ${CHAT_RATE_LIMIT_UPLOAD:-60}
      LETTA_BASE_URL: ${LETTA_BASE_URL:-}
      LETTA_CHAT_PATH: ${LETTA_CHAT_PATH:-/v1/chat/stream}
      LETTA_HEALTH_PATH: ${LETTA_HEALTH_PATH:-/health}
      LETTA_AGENT_ID: ${LETTA_AGENT_ID:-}
      LETTA_API_KEY: ${LETTA_API_KEY:-}
      LETTA_TIMEOUT_MS: ${LETTA_TIMEOUT_MS:-10000}
      HERMES_BASE_URL: ${HERMES_BASE_URL:-}
      HERMES_CHAT_PATH: ${HERMES_CHAT_PATH:-/v1/chat/stream}
      HERMES_HEALTH_PATH: ${HERMES_HEALTH_PATH:-/health}
      HERMES_AGENT_ID: ${HERMES_AGENT_ID:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_TIMEOUT_MS: ${HERMES_TIMEOUT_MS:-10000}
    volumes:
      - ${CHAT_STAGING_DATA_DIR:-/opt/chat-v2/staging/data}:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4174/api/health').then(async r=>{const j=await r.json();if(!r.ok||!j.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 4
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
