services:
  chat-v2-staging:
    image: ${CHAT_IMAGE:?CHAT_IMAGE is required}
    container_name: chat-v2-staging
    restart: unless-stopped
    init: true
    user: "${CHAT_RUNTIME_UID:-1000}:${CHAT_RUNTIME_GID:-1000}"
    ports:
      - "127.0.0.1:${CHAT_STAGING_PORT:-14174}:4174"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      CHAT_ENVIRONMENT: staging
      CHAT_API_PORT: 4174
      CHAT_DB_PATH: /data/chat-v2.sqlite
      CHAT_ARTIFACT_ROOT: /data/artifacts
      CHAT_BACKUP_ROOT: /data/backups
      CHAT_BACKUP_RETENTION: ${CHAT_BACKUP_RETENTION:-10}
      CHAT_WEB_ROOT: /app/dist
      CHAT_PUBLIC_ORIGIN: ${CHAT_PUBLIC_ORIGIN:-}
      CHAT_ALLOWED_ORIGIN: ${CHAT_ALLOWED_ORIGIN:-}
      CHAT_AUTH_MODE: ${CHAT_AUTH_MODE:-disabled}
      CHAT_ALLOWED_EMAILS: ${CHAT_ALLOWED_EMAILS:-}
      CHAT_ALLOWED_SERVICE_CLIENT_IDS: ${CHAT_ALLOWED_SERVICE_CLIENT_IDS:-}
      CHAT_CF_ACCESS_ISSUER: ${CHAT_CF_ACCESS_ISSUER:-}
      CHAT_CF_ACCESS_AUD: ${CHAT_CF_ACCESS_AUD:-}
      CHAT_ACCESS_TOKEN: ${CHAT_ACCESS_TOKEN:-}
      CHAT_RATE_LIMIT_GENERAL: ${CHAT_RATE_LIMIT_GENERAL:-300}
      CHAT_RATE_LIMIT_CHAT: ${CHAT_RATE_LIMIT_CHAT:-30}
      CHAT_RATE_LIMIT_UPLOAD: ${CHAT_RATE_LIMIT_UPLOAD:-60}
      CHAT_MAX_UPLOAD_BYTES: ${CHAT_MAX_UPLOAD_BYTES:-52428800}
      CHAT_MAX_GENERATED_ARTIFACT_BYTES: ${CHAT_MAX_GENERATED_ARTIFACT_BYTES:-52428800}
      CHAT_MAX_EXTRACTED_TEXT_CHARACTERS: ${CHAT_MAX_EXTRACTED_TEXT_CHARACTERS:-2000000}
      CHAT_MAX_PDF_PAGES: ${CHAT_MAX_PDF_PAGES:-200}
      LETTA_BASE_URL: ${LETTA_BASE_URL:-}
      LETTA_CHAT_PATH: ${LETTA_CHAT_PATH:-/v1/chat/stream}
      LETTA_HEALTH_PATH: ${LETTA_HEALTH_PATH:-/health}
      LETTA_AGENT_ID: ${LETTA_AGENT_ID:-}
      LETTA_API_KEY: ${LETTA_API_KEY:-}
      LETTA_TIMEOUT_MS: ${LETTA_TIMEOUT_MS:-10000}
      LETTA_PROTOCOL: ${LETTA_PROTOCOL:-native}
      LETTA_MODEL_MAP_JSON: ${LETTA_MODEL_MAP_JSON:-}
      LETTA_MAX_ARTIFACT_BYTES: ${LETTA_MAX_ARTIFACT_BYTES:-10485760}
      LETTA_MAX_ARTIFACT_TOTAL_BYTES: ${LETTA_MAX_ARTIFACT_TOTAL_BYTES:-20971520}
      LETTA_MAX_TEXT_ARTIFACT_BYTES: ${LETTA_MAX_TEXT_ARTIFACT_BYTES:-10485760}
      LETTA_NATIVE_BINARY_ARTIFACTS: ${LETTA_NATIVE_BINARY_ARTIFACTS:-false}
      LETTA_ARTIFACT_TOOL_ENABLED: ${LETTA_ARTIFACT_TOOL_ENABLED:-false}
      HERMES_BASE_URL: ${HERMES_BASE_URL:-}
      HERMES_CHAT_PATH: ${HERMES_CHAT_PATH:-/v1/chat/stream}
      HERMES_HEALTH_PATH: ${HERMES_HEALTH_PATH:-/health}
      HERMES_AGENT_ID: ${HERMES_AGENT_ID:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_TIMEOUT_MS: ${HERMES_TIMEOUT_MS:-10000}
      HERMES_PROTOCOL: ${HERMES_PROTOCOL:-native}
      HERMES_MODEL_MAP_JSON: ${HERMES_MODEL_MAP_JSON:-}
      HERMES_MAX_ARTIFACT_BYTES: ${HERMES_MAX_ARTIFACT_BYTES:-10485760}
      HERMES_MAX_ARTIFACT_TOTAL_BYTES: ${HERMES_MAX_ARTIFACT_TOTAL_BYTES:-20971520}
      HERMES_ARTIFACT_TOOL_ENABLED: ${HERMES_ARTIFACT_TOOL_ENABLED:-false}
      HERMES_ARTIFACT_ENVELOPE_ENABLED: ${HERMES_ARTIFACT_ENVELOPE_ENABLED:-false}
    volumes:
      - ${CHAT_STAGING_DATA_DIR:-/opt/chat-v2/staging/data}:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:4174/api/health').then(async r=>{const j=await r.json();if(!r.ok||!j.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 4
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
